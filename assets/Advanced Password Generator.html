<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Password Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 35px;
            max-width: 550px;
            width: 100%;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.2em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1.1em;
        }

        .slider-container {
            position: relative;
            margin: 15px 0;
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            transition: all 0.3s ease;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .slider::-moz-range-thumb {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .length-display {
            position: absolute;
            right: 0;
            top: -35px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .checkbox-item:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .checkbox-item input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }

        .generate-btn:hover::before {
            left: 100%;
        }

        .password-output {
            margin: 20px 0;
        }

        .password-display {
            display: flex;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            min-height: 50px;
        }

        .password-display.success {
            border-color: #28a745;
            animation: successPulse 0.6s ease;
        }

        @keyframes successPulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }

        .password-field {
            flex: 1;
            padding: 15px;
            border: none;
            background: transparent;
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            color: #333;
            outline: none;
        }

        .copy-btn {
            padding: 15px 20px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .copy-btn:hover {
            background: linear-gradient(135deg, #218838, #1ba085);
        }

        .copy-btn.copied {
            background: linear-gradient(135deg, #17a2b8, #138496);
        }

        .strength-meter {
            margin: 15px 0;
        }

        .strength-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }

        .strength-fill {
            height: 100%;
            transition: all 0.5s ease;
            border-radius: 4px;
        }

        .strength-weak {
            background: linear-gradient(90deg, #dc3545, #c82333);
        }

        .strength-medium {
            background: linear-gradient(90deg, #ffc107, #e0a800);
        }

        .strength-strong {
            background: linear-gradient(90deg, #28a745, #1e7e34);
        }

        .strength-very-strong {
            background: linear-gradient(90deg, #17a2b8, #138496);
        }

        .strength-text {
            font-weight: 600;
            font-size: 0.9em;
        }

        .last-password-section {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #e9ecef;
        }

        .last-password-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .no-password {
            color: #6c757d;
            font-style: italic;
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #f5c6cb;
            animation: shake 0.5s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .tooltip:hover::after {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
                margin: 10px;
            }

            .checkbox-group {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }

        .delete-btn {
            padding: 12px 15px;
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9em;
            min-width: 80px;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: linear-gradient(135deg, #c82333, #a71e2a);
        }

        .last-password-actions {
            display: flex;
            gap: 0;
            flex-shrink: 0;
            min-width: 160px;
        }

        .last-password-actions .copy-btn {
            border-radius: 0;
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            padding: 12px 15px;
            font-size: 0.9em;
            min-width: 80px;
            flex: 1;
        }

        .last-password-actions .delete-btn {
            border-radius: 0;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            flex: 1;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
                margin: 10px;
            }

            .checkbox-group {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            /* Add these new mobile-specific rules */
            .password-display {
                flex-direction: column;
            }

            .password-field {
                border-radius: 12px 12px 0 0;
                border-bottom: 1px solid #e9ecef;
            }

            .last-password-actions {
                min-width: 100%;
                border-radius: 0 0 12px 12px;
            }

            .last-password-actions .copy-btn {
                border-radius: 0 0 0 12px;
                flex: 1;
                padding: 15px 10px;
                font-size: 0.85em;
            }

            .last-password-actions .delete-btn {
                border-radius: 0 0 12px 0;
                flex: 1;
                padding: 15px 10px;
                font-size: 0.85em;
            }

            /* Ensure buttons don't get too small */
            .copy-btn,
            .delete-btn {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Password Generator 🔐</h1>
            <p>Create ultra-secure passwords instantly</p>
        </div>

        <form id="passwordForm">
            <div class="form-group">
                <h2 for="length">Password Length</h2>
                <div class="slider-container">
                    <div class="length-display" id="lengthDisplay">30</div>
                    <input type="range" id="length" class="slider" min="8" max="128" value="30">
                </div>
            </div>

            <div class="form-group">
                <h2>Character Types</h2>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="lowercase" checked>
                        <span>Lowercase (a-z)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="uppercase" checked>
                        <span>Uppercase (A-Z)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="numbers" checked>
                        <span>Numbers (0-9)</span>
                    </label>
                    <label class="checkbox-item tooltip" data-tooltip="!@#$%^&*()_+-=[]{}|;:,.<>?">
                        <input type="checkbox" id="symbols" checked>
                        <span>Symbols</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="excludeSimilar">
                    <span>Exclude similar characters (0, O, l, I)</span>
                </label>
            </div>

            <button type="submit" class="generate-btn">
                🎲 Generate Password
            </button>
        </form>

        <div id="errorContainer"></div>

        <div class="password-output">
            <div class="password-display" id="passwordDisplay">
                <input type="text" class="password-field" id="passwordField"
                    placeholder="Your generated password will appear here..." readonly>
                <button class="copy-btn" id="copyBtn" type="button">📋 Copy</button>
            </div>

            <div class="strength-meter" id="strengthMeter" style="display: none;">
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>
        </div>

        <div class="last-password-section">
            <h3>🕒 Last Generated Password</h3>
            <div id="lastPasswordContainer">
                <div class="no-password">No password generated yet</div>
            </div>
        </div>
    </div>

    <script>
        class PasswordGenerator {
            constructor() {
                this.dbName = 'PasswordGeneratorDB';
                this.dbVersion = 1;
                this.storeName = 'passwords';
                this.db = null;

                this.charSets = {
                    lowercase: 'abcdefghijklmnopqrstuvwxyz',
                    uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
                    numbers: '09876543210123456789',
                    symbols: '!@#$%^&*()_+-=[!@#$%^&*()_+-=[]{}|;:,.<>?]{}|;:,.<>?'
                };

                this.similarChars = '0Ol1iI';

                this.initializeDB();
                this.setupEventListeners();
                this.loadLastPassword();
            }

            async initializeDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);

                    request.onerror = () => reject(request.error);

                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains(this.storeName)) {
                            const store = db.createObjectStore(this.storeName, { keyPath: 'id' });
                            store.createIndex('timestamp', 'timestamp', { unique: false });
                        }
                    };
                });
            }

            setupEventListeners() {
                const lengthSlider = document.getElementById('length');
                const lengthDisplay = document.getElementById('lengthDisplay');
                const form = document.getElementById('passwordForm');
                const copyBtn = document.getElementById('copyBtn');

                lengthSlider.addEventListener('input', (e) => {
                    lengthDisplay.textContent = e.target.value;
                });

                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.generatePassword();
                });

                copyBtn.addEventListener('click', () => {
                    this.copyToClipboard('passwordField', copyBtn);
                });
            }

            validateForm() {
                const checkboxes = ['lowercase', 'uppercase', 'numbers', 'symbols'];
                const checkedBoxes = checkboxes.filter(id => document.getElementById(id).checked);

                const errorContainer = document.getElementById('errorContainer');
                errorContainer.innerHTML = '';

                if (checkedBoxes.length === 0) {
                    this.showError('Please select at least one character type.');
                    return false;
                }

                const length = parseInt(document.getElementById('length').value);
                if (length < 8 || length > 128) {
                    this.showError('Password length must be between 8 and 128 characters.');
                    return false;
                }

                return true;
            }

            showError(message) {
                const errorContainer = document.getElementById('errorContainer');
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = message;
                errorContainer.appendChild(errorDiv);

                setTimeout(() => {
                    errorDiv.remove();
                }, 5000);
            }

            generatePassword() {
                if (!this.validateForm()) return;

                const length = parseInt(document.getElementById('length').value);
                const options = {
                    lowercase: document.getElementById('lowercase').checked,
                    uppercase: document.getElementById('uppercase').checked,
                    numbers: document.getElementById('numbers').checked,
                    symbols: document.getElementById('symbols').checked,
                    excludeSimilar: document.getElementById('excludeSimilar').checked
                };

                let charset = '';
                let guaranteedChars = [];

                // Build charset and ensure at least one character from each selected type
                Object.keys(options).forEach(key => {
                    if (options[key] && this.charSets[key]) {
                        let chars = this.charSets[key];
                        if (options.excludeSimilar && key !== 'symbols') {
                            chars = chars.split('').filter(char => !this.similarChars.includes(char)).join('');
                        }
                        charset += chars;
                        // Add one guaranteed character from this set
                        if (chars.length > 0) {
                            guaranteedChars.push(chars[Math.floor(Math.random() * chars.length)]);
                        }
                    }
                });

                if (charset.length === 0) {
                    this.showError('No valid characters available with current settings.');
                    return;
                }

                // Generate password
                let password = '';

                // Add guaranteed characters first
                guaranteedChars.forEach(char => {
                    password += char;
                });

                // Fill the rest randomly
                for (let i = guaranteedChars.length; i < length; i++) {
                    password += charset[Math.floor(Math.random() * charset.length)];
                }

                // Shuffle the password to avoid predictable patterns
                password = this.shuffleString(password);

                // Display the password
                this.displayPassword(password);
                this.savePassword(password);
            }

            shuffleString(str) {
                const arr = str.split('');
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr.join('');
            }

            displayPassword(password) {
                const passwordField = document.getElementById('passwordField');
                const passwordDisplay = document.getElementById('passwordDisplay');

                passwordField.value = password;
                passwordDisplay.classList.add('success');

                setTimeout(() => {
                    passwordDisplay.classList.remove('success');
                }, 600);

                this.updateStrengthMeter(password);
            }

            updateStrengthMeter(password) {
                const strengthMeter = document.getElementById('strengthMeter');
                const strengthFill = document.getElementById('strengthFill');
                const strengthText = document.getElementById('strengthText');

                const score = this.calculatePasswordStrength(password);
                let strength, percentage, className;

                if (score < 3) {
                    strength = 'Weak';
                    percentage = 25;
                    className = 'strength-weak';
                } else if (score < 4) {
                    strength = 'Medium';
                    percentage = 50;
                    className = 'strength-medium';
                } else if (score < 5) {
                    strength = 'Strong';
                    percentage = 75;
                    className = 'strength-strong';
                } else {
                    strength = 'Very Strong';
                    percentage = 100;
                    className = 'strength-very-strong';
                }

                strengthFill.style.width = percentage + '%';
                strengthFill.className = 'strength-fill ' + className;
                strengthText.textContent = `Strength: ${strength}`;
                strengthMeter.style.display = 'block';
            }

            calculatePasswordStrength(password) {
                let score = 0;

                // Length score
                if (password.length >= 12) score += 1;
                if (password.length >= 16) score += 1;

                // Character type scores
                if (/[a-z]/.test(password)) score += 1;
                if (/[A-Z]/.test(password)) score += 1;
                if (/[0-9]/.test(password)) score += 1;
                if (/[^A-Za-z0-9]/.test(password)) score += 1;

                // Additional complexity
                if (password.length >= 20) score += 1;

                return score;
            }

            async copyToClipboard(fieldId, button) {
                const field = document.getElementById(fieldId);
                const originalText = button.textContent;

                try {
                    await navigator.clipboard.writeText(field.value);
                    button.textContent = '✅ Copied!';
                    button.classList.add('copied');

                    setTimeout(() => {
                        button.textContent = originalText;
                        button.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    // Fallback for older browsers
                    field.select();
                    field.setSelectionRange(0, 99999);
                    document.execCommand('copy');

                    button.textContent = '✅ Copied!';
                    setTimeout(() => {
                        button.textContent = originalText;
                    }, 2000);
                }
            }

            async savePassword(password) {
                if (!this.db) return;

                const transaction = this.db.transaction([this.storeName], 'readwrite');
                const store = transaction.objectStore(this.storeName);

                const passwordData = {
                    id: 'lastPassword',
                    password: password,
                    timestamp: new Date().toISOString(),
                    strength: this.calculatePasswordStrength(password)
                };

                try {
                    await store.put(passwordData);
                    this.displayLastPassword(passwordData);
                } catch (error) {
                    console.error('Error saving password:', error);
                }
            }

            async loadLastPassword() {
                if (!this.db) {
                    setTimeout(() => this.loadLastPassword(), 100);
                    return;
                }

                const transaction = this.db.transaction([this.storeName], 'readonly');
                const store = transaction.objectStore(this.storeName);

                try {
                    const request = store.get('lastPassword');
                    request.onsuccess = () => {
                        if (request.result) {
                            this.displayLastPassword(request.result);
                        }
                    };
                } catch (error) {
                    console.error('Error loading last password:', error);
                }
            }

            async deleteLastPassword() {
                if (!this.db) return;

                const transaction = this.db.transaction([this.storeName], 'readwrite');
                const store = transaction.objectStore(this.storeName);

                try {
                    await store.delete('lastPassword');
                    this.displayNoPassword();
                } catch (error) {
                    console.error('Error deleting password:', error);
                }
            }

            displayNoPassword() {
                const container = document.getElementById('lastPasswordContainer');
                container.innerHTML = '<div class="no-password">No password generated yet</div>';
            }

            displayLastPassword(passwordData) {
                const container = document.getElementById('lastPasswordContainer');
                const timeAgo = this.getTimeAgo(new Date(passwordData.timestamp));

                container.innerHTML = `
        <div class="password-display">
            <input type="text" class="password-field" id="lastPasswordField" value="${passwordData.password}" readonly>
            <div class="last-password-actions">
                <button class="copy-btn" id="copyLastBtn" type="button">📋 Copy</button>
                <button class="delete-btn" id="deleteLastBtn" type="button">🗑️ Delete</button>
            </div>
        </div>
        <div style="margin-top: 10px; color: #6c757d; font-size: 0.9em;">
            Generated ${timeAgo} • Strength: ${this.getStrengthText(passwordData.strength)}
        </div>
    `;

                document.getElementById('copyLastBtn').addEventListener('click', () => {
                    this.copyToClipboard('lastPasswordField', document.getElementById('copyLastBtn'));
                });

                document.getElementById('deleteLastBtn').addEventListener('click', () => {
                    if (confirm('Are you sure you want to delete the saved password?')) {
                        this.deleteLastPassword();
                    }
                });
            }

            getStrengthText(score) {
                if (score < 3) return 'Weak';
                if (score < 4) return 'Medium';
                if (score < 5) return 'Strong';
                return 'Very Strong';
            }

            getTimeAgo(date) {
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMins / 60);
                const diffDays = Math.floor(diffHours / 24);

                if (diffMins < 1) return 'just now';
                if (diffMins < 60) return `${diffMins} minute${diffMins !== 1 ? 's' : ''} ago`;
                if (diffHours < 24) return `${diffHours} hour${diffHours !== 1 ? 's' : ''} ago`;
                return `${diffDays} day${diffDays !== 1 ? 's' : ''} ago`;
            }
        }

        // Initialize the password generator when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new PasswordGenerator();
        });
    </script>
</body>

</html>
